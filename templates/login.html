{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-2xl shadow-sm p-8 md:p-10 border border-slate-100 mt-20">
    <div class="text-center mb-8">
        <div class="inline-flex justify-center items-center w-16 h-16 rounded-full bg-blue-50 text-blue-600 mb-4">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg>
        </div>
        <h2 class="text-2xl font-bold text-slate-800" data-i18n="loginTitle">Welcome Back</h2>
    </div>

    <form id="login-form" class="space-y-6">
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2" data-i18n="usernameLabel">Username</label>
            <input type="text" id="login-username" required class="w-full border-slate-300 rounded-lg shadow-sm focus:border-blue-500 focus:ring-blue-500 p-3 border bg-slate-50">
        </div>
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2" data-i18n="passwordLabel">Password</label>
            <input type="password" id="login-password" required class="w-full border-slate-300 rounded-lg shadow-sm focus:border-blue-500 focus:ring-blue-500 p-3 border bg-slate-50">
        </div>
        <button type="submit" id="login-btn" class="w-full bg-slate-900 text-white font-bold py-3.5 px-4 rounded-lg hover:bg-slate-800 transition duration-200 shadow-md">
            <span data-i18n="navLogin">Login</span>
        </button>
    </form>
    
    <div id="login-status" class="hidden mt-4 p-3 rounded-lg text-center text-sm font-medium"></div>

    <p class="mt-8 text-center text-sm text-slate-500">
        <span data-i18n="noAccountMsg">Don't have an account?</span> 
        <a href="/register" class="text-blue-600 hover:underline font-semibold" data-i18n="navRegister">Sign Up</a>
    </p>
</div>
{% endblock %}
